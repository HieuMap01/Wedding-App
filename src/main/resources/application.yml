server:
  port: 8080

spring:
  application:
    name: wedding-monolith
  datasource:
    url: jdbc:mysql://localhost:3306/wedding_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:12092003}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:your-app-password}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:WeddingSaaSSecretKeyForJWTTokenGeneration2024VeryLongAndSecure}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

file:
  upload-dir: ./uploads/wedding-images

app:
  mail:
    admin: ${APP_MAIL_ADMIN:admin@example.com}
  frontend-url: ${PUBLIC_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
